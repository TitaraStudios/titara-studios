<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A1B6B" />
      <stop offset="1" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="cube1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C5CE7" />
      <stop offset="1" stop-color="#4733DE" />
    </linearGradient>
    <linearGradient id="cube2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00D2FF" />
      <stop offset="1" stop-color="#00A8CC" />
    </linearGradient>
    <linearGradient id="cube3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD93D" />
      <stop offset="1" stop-color="#E6BE00" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)" />
  <circle cx="640" cy="110" r="180" fill="#6C5CE7" opacity="0.18" />
  <circle cx="160" cy="380" r="150" fill="#00D2FF" opacity="0.12" />

  <!-- cube cluster -->
  <g transform="translate(300 170)">
    <rect x="0" y="60" width="120" height="120" rx="22" fill="url(#cube1)" />
    <circle cx="42" cy="105" r="11" fill="#fff" />
    <circle cx="84" cy="105" r="11" fill="#fff" />
    <circle cx="42" cy="105" r="5" fill="#0F172A" />
    <circle cx="84" cy="105" r="5" fill="#0F172A" />
    <path d="M40 140 Q60 158 86 140" stroke="#0F172A" stroke-width="6" fill="none" stroke-linecap="round" />

    <rect x="150" y="20" width="92" height="92" rx="18" fill="url(#cube2)" transform="rotate(8 196 66)" />
    <circle cx="180" cy="55" r="8" fill="#0F172A" />
    <circle cx="212" cy="55" r="8" fill="#0F172A" />

    <rect x="-120" y="40" width="84" height="84" rx="16" fill="url(#cube3)" transform="rotate(-10 -78 82)" />
    <circle cx="-96" cy="74" r="7" fill="#0F172A" />
    <circle cx="-66" cy="74" r="7" fill="#0F172A" />
  </g>

  <text x="400" y="430" font-family="Space Grotesk, sans-serif" font-size="46"
        font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">
    MONSTER CUBES
  </text>
</svg>
