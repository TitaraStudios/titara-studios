<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6C5CE7" />
      <stop offset="1" stop-color="#00D2FF" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0" stop-color="#6C5CE7" stop-opacity="0.45" />
      <stop offset="1" stop-color="#6C5CE7" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <text x="600" y="290" font-family="Space Grotesk, sans-serif" font-size="84"
        font-weight="700" fill="#fff" text-anchor="middle">Titara Studios</text>
  <text x="600" y="360" font-family="Inter, sans-serif" font-size="34"
        fill="url(#brand)" text-anchor="middle" font-weight="600">
    Crafting Games Players Love
  </text>
  <text x="600" y="420" font-family="Inter, sans-serif" font-size="24"
        fill="#94A3B8" text-anchor="middle">
    Polished mobile games built with Unity
  </text>
</svg>
